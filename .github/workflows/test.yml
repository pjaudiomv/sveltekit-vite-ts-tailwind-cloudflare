name: test
on:
  push:
    branches-ignore: ['main']

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout 🛒
        uses: actions/checkout@v6

      - name: node 24 ❇️
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: cache dependencies 💾
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: install 📦
        run: npm ci

      - name: lint 🧹
        run: npm run lint

      - name: check 🔎
        run: npm run check
